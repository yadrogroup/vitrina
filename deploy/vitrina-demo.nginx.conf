# Demo-сайт Vitrina. НЕ default_server — ловит только свой hostname.
# Откат: rm /etc/nginx/sites-enabled/vitrina-demo && systemctl reload nginx
server {
    listen 80;
    listen [::]:80;
    server_name vitrina.72.56.21.243.sslip.io;

    root /opt/vitrina-demo/dist;
    index index.html;

    access_log /var/log/nginx/vitrina-demo.access.log;
    error_log  /var/log/nginx/vitrina-demo.error.log;

    # Релей заказов (Node.js на localhost:8787)
    location /api/order {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $content_type;
        client_max_body_size 1m;
    }

    # Поиск по фото (SigLIP на localhost:8788)
    location /api/photo-search {
        proxy_pass http://127.0.0.1:8788/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $content_type;
        proxy_read_timeout 60s;
        client_max_body_size 6m;
    }

    # Админка (Node на localhost:8790). Прокси и UI, и её /api/*.
    location = /admin { return 301 /admin/; }
    location /admin/ {
        proxy_pass http://127.0.0.1:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 14m;
    }

    # Загруженные фото — из public/uploads админки (доступны сразу, до пересборки).
    # Путь = PROJECT_ROOT админки (/opt/vitrina-embed), куда server.mjs пишет webp.
    location /uploads/ {
        alias /opt/vitrina-embed/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /_astro/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /models/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
