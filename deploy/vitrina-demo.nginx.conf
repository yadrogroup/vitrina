# Demo-сайт Vitrina. НЕ default_server — ловит только свой hostname.
# Откат: rm /etc/nginx/sites-enabled/vitrina-demo && systemctl reload nginx
server {
    listen 80;
    listen [::]:80;
    server_name vitrina.72.56.21.243.sslip.io;

    root /opt/vitrina-demo/dist;
    index index.html;

    access_log /var/log/nginx/vitrina-demo.access.log;
    error_log  /var/log/nginx/vitrina-demo.error.log;

    # Релей заказов (Node.js на localhost:8787)
    location /api/order {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Content-Type $content_type;
        client_max_body_size 1m;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /_astro/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /models/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
